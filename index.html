<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포스코이앤씨 Safety Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF6B35;
            --bg-color: #FFF8F0;
            --accent-color: #5C3D2E;
            --card-bg: #FFFFFF;
            --text-color: #222222;
            --border-color: #EADBC8;
            --holiday-color: #D9534F;
            --sat-color: #3175D0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 30px 20px; line-height: 1.4; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2.6rem; font-weight: 900; color: var(--accent-color); margin-bottom: 10px; letter-spacing: -1px; }
        header p { font-size: 1.1rem; color: #666; font-weight: 500; }
        
        .toolbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 40px; 
            margin-bottom: 25px; 
            background: var(--card-bg); 
            padding: 20px 30px; 
            border-radius: 14px; 
            box-shadow: 0 4px 15px rgba(92, 61, 46, 0.06); 
            position: relative; 
        }
        .month-nav { display: flex; align-items: center; gap: 30px; }
        .btn-nav { background-color: var(--accent-color); color: white; border: none; padding: 10px 25px; font-size: 1rem; font-weight: 700; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-nav:hover { background-color: var(--primary-color); }
        .current-month-display { font-size: 2.4rem; font-weight: 900; color: var(--primary-color); min-width: 160px; text-align: center; }
        
        .btn-share { background-color: #4A90E2; color: white; border: none; padding: 12px 20px; font-size: 0.95rem; font-weight: 700; border-radius: 8px; cursor: pointer; margin-right: 140px; }
        
        /* 안냥이 위치: 내비게이션 바 우측 끝 배치 */
        .mascot-peeking {
            position: absolute;
            bottom: -20px; 
            right: 20px;   
            width: 110px;  
            height: auto;
            z-index: 10; 
            pointer-events: none; 
        }

        .single-calendar-container { background: var(--card-bg); border-radius: 20px; padding: 30px; box-shadow: 0 8px 24px rgba(92, 61, 46, 0.08); border: 1px solid var(--border-color); }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-left: 1px solid #f0e6da; border-top: 1px solid #f0e6da; }
        .weekdays { font-weight: 800; font-size: 1.1rem; color: #555; padding: 15px 0; background-color: #fffbf7; text-align: center; border-right: 1px solid #f0e6da; border-bottom: 2px solid var(--border-color); }
        .day-cell { min-height: 140px; padding: 8px; background: #fff; border-right: 1px solid #f0e6da; border-bottom: 1px solid #f0e6da; cursor: pointer; position: relative; display: flex; flex-direction: column; gap: 4px; }
        .day-cell.empty { background-color: #fafaf8; cursor: default; }
        .day-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .day-number { font-size: 1.2rem; font-weight: 700; color: #333; }
        .day-cell:nth-child(7n+1) .day-number { color: var(--holiday-color); }
        .day-cell:nth-child(7n) .day-number { color: var(--sat-color); }
        .day-cell.holiday .day-number { color: var(--holiday-color); }
        .holiday-name { font-size: 0.75rem; font-weight: 700; color: var(--holiday-color); background-color: #fdeeed; padding: 2px 6px; border-radius: 4px; max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .day-events-container { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; flex-grow: 1; }
        .inline-event-item { font-size: 0.78rem; padding: 5px 8px; border-radius: 6px; background-color: #fff2ec; border-left: 4px solid var(--primary-color); color: #333; font-weight: 500; line-height: 1.3; }
        .event-title-line { font-weight: 700; color: var(--accent-color); margin-bottom: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .event-desc-line { color: #555; font-size: 0.72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* 팝업창 모달 디자인 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: white; padding: 35px; border-radius: 20px; width: 100%; max-width: 550px; border-top: 8px solid var(--primary-color); }
        .modal-header { font-size: 1.5rem; font-weight: 800; color: var(--accent-color); margin-bottom: 25px; display: flex; justify-content: space-between; }
        .close-modal { cursor: pointer; color: #aaa; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; color: #444; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 1rem; }
        .form-actions { margin-top: 30px; display: flex; justify-content: flex-end; gap: 12px; }
        .btn { padding: 12px 22px; border-radius: 8px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .btn-save { background: var(--primary-color); color: white; }
        .btn-cancel { background: #eee; color: #555; }
        .btn-delete { background: #d9534f; color: white; margin-right: auto; }
        
        #exportContent { width: 100%; height: 200px; font-family: monospace; font-size: 0.8rem; padding: 10px; margin-top: 10px; border: 1px solid var(--border-color); border-radius: 8px; background: #fafafa; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>포스코이앤씨 Safety Academy</h1>
        <p>종합 안전 교육 통합 연간 일정 대시보드</p>
    </header>
    
    <div class="toolbar">
        <div class="month-nav">
            <button class="btn-nav" onclick="changeMonth(-1)">◀ 이전 달</button>
            <div class="current-month-display" id="currentMonthTxt">5월</div>
            <button class="btn-nav" onclick="changeMonth(1)">다음 달 ▶</button>
        </div>
        
        <button class="btn-share" onclick="openExportModal()">⚙️ 협력사 실시간 반영 코드 추출</button>
        
        <img src="annyang.png" alt="안냥이" class="mascot-peeking">
    </div>
    
    <div class="single-calendar-container">
        <div class="days-grid" id="calendarDaysGrid"></div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">일정 상세/수정</span>
            <span class="close-modal" onclick="closeModal()">✕</span>
        </div>
        <input type="hidden" id="editDate"><input type="hidden" id="editIndex">
        <div class="form-group"><label>교육명</label><input type="text" id="formTitle"></div>
        <div class="form-group"><label>대상</label><input type="text" id="formTarget"></div>
        <div class="form-group"><label>차수</label><input type="text" id="formDegree"></div>
        <div class="form-group"><label>장소</label><input type="text" id="formLocation"></div>
        <div class="form-group"><label>기간</label>
            <div style="display:flex; gap:10px;"><input type="date" id="formStart" readonly><input type="date" id="formEnd" readonly></div>
        </div>
        <div class="form-actions">
            <button class="btn btn-delete" onclick="deleteEvent()">삭제</button>
            <button class="btn btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn btn-save" onclick="saveEvent()">화면 저장</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="exportModal">
    <div class="modal-content" style="max-width: 650px;">
        <div class="modal-header">
            <span>⚙️ 최신 데이터가 반영된 소스코드</span>
            <span class="close-modal" onclick="closeExportModal()">✕</span>
        </div>
        <p style="font-size:0.9rem; color:#555; margin-bottom:10px;">아래 상자 안의 코드가 고객님이 화면에서 수정한 일정이 반영된 최신 코드입니다.<br>전체 복사 후 깃허브 index.html에 그대로 덮어쓰기 하시면 협력사에 실시간 배포됩니다.</p>
        <textarea id="exportContent" readonly></textarea>
        <div class="form-actions">
            <button class="btn btn-cancel" onclick="closeExportModal()">닫기</button>
            <button class="btn btn-save" onclick="copyExportCode()">📋 코드 전체 복사하기</button>
        </div>
    </div>
</div>

        {name:"관리감독자", start:"2026-07-21", end:"2026-07-22", target:"CAE&기타", degree:"8차", loc:"LC 202호(신청)"},

        {name:"관리감독자", start:"2026-11-23", end:"2026-11-24", target:"CAE&기타", degree:"35차", loc:"LC"},
        {name:"관리감독자", start:"2026-11-24", end:"2026-11-25", target:"CAE&기타", degree:"36차", loc:"LC"},
        {name:"관리감독자", start:"2026-12-01", end:"2026-12-02", target:"CAE&기타", degree:"37차", loc:"LC"},
        {name:"관리감독자", start:"2026-12-03", end:"2026-12-04", target:"CAE&기타", degree:"38차", loc:"LC"},
        {name:"관리감독자", start:"2026-12-08", end:"2026-12-09", target:"CAE&기타", degree:"39차", loc:"LC"},
        {name:"관리감독자", start:"2026-12-10", end:"2026-12-11", target:"CAE&기타", degree:"40차", loc:"LC"}
    ];

    let academyEvents = [];

    function initData() {
        const localData = localStorage.getItem('safety_academy_events');
        if (localData) {
            academyEvents = JSON.parse(localData);
        } else {
            academyEvents = JSON.parse(JSON.stringify(rawEvents));
            localStorage.setItem('safety_academy_events', JSON.stringify(academyEvents));
        }
    }

    function getEventsForDate(dateStr) {
        return academyEvents.filter(ev => dateStr >= ev.start && dateStr <= ev.end);
    }

    function changeMonth(direction) {
        currentRenderMonth += direction;
        if (currentRenderMonth < 1) currentRenderMonth = 12;
        if (currentRenderMonth > 12) currentRenderMonth = 1;
        renderSingleMonth();
    }

    function renderSingleMonth() {
        document.getElementById('currentMonthTxt').innerText = `${currentRenderMonth}월`;
        const grid = document.getElementById('calendarDaysGrid');
        grid.innerHTML = '';

        const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
        weekdays.forEach(wd => {
            const wdDiv = document.createElement('div');
            wdDiv.className = 'weekdays';
            wdDiv.innerText = wd;
            grid.appendChild(wdDiv);
        });

        const firstDay = new Date(currentRenderYear, currentRenderMonth - 1, 1).getDay();
        const totalDays = new Date(currentRenderYear, currentRenderMonth, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell empty';
            grid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            const headerRow = document.createElement('div');
            headerRow.className = 'day-header-row';

            const dayNum = document.createElement('div');
            dayNum.className = 'day-number';
            dayNum.innerText = day;
            headerRow.appendChild(dayNum);

            const mm = String(currentRenderMonth).padStart(2, '0');
            const dd = String(day).padStart(2, '0');
            const fullDateStr = `${currentRenderYear}-${mm}-${dd}`;
            const mdStr = `${mm}-${dd}`;

            if (holidays2026[mdStr]) {
                cell.classList.add('holiday');
                const hlName = document.createElement('div');
                hlName.className = 'holiday-name';
                hlName.innerText = holidays2026[mdStr];
                headerRow.appendChild(hlName);
            }
            cell.appendChild(headerRow);

            const eventsContainer = document.createElement('div');
            eventsContainer.className = 'day-events-container';

            const dayEvents = getEventsForDate(fullDateStr);
            dayEvents.forEach(ev => {
                const evBox = document.createElement('div');
                evBox.className = 'inline-event-item';
                evBox.innerHTML = `
                    <div class="event-title-line">${ev.name} (${ev.degree})</div>
                    <div class="event-desc-line">🎯 ${ev.target || '전체'}</div>
                    <div class="event-desc-line">📍 ${ev.loc || '미정'}</div>
                `;
                eventsContainer.appendChild(evBox);
            });
            cell.appendChild(eventsContainer);

            // 직접 클릭 시 수정 팝업창 활성화 기믹 작동
            cell.onclick = () => openDetails(fullDateStr, dayEvents);
            grid.appendChild(cell);
        }
    }

    function openDetails(dateStr, events) {
        document.getElementById('editDate').value = dateStr;
        const overlay = document.getElementById('modalOverlay');
        if (events.length > 0) {
            const ev = events[0];
            const globalIdx = academyEvents.findIndex(e => e.start === ev.start && e.end === ev.end && e.degree === ev.degree && e.name === ev.name);
            document.getElementById('editIndex').value = globalIdx;
            document.getElementById('modalTitle').innerText = `📅 ${dateStr} 일정 상세/수정`;
            document.getElementById('formTitle').value = ev.name;
            document.getElementById('formTarget').value = ev.target;
            document.getElementById('formDegree').value = ev.degree;
            document.getElementById('formLocation').value = ev.loc;
            document.getElementById('formStart').value = ev.start;
            document.getElementById('formEnd').value = ev.end;
        } else {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('modalTitle').innerText = `📅 ${dateStr} 신규 일정 등록`;
            document.getElementById('formTitle').value = "";
            document.getElementById('formTarget').value = "";
            document.getElementById('formDegree').value = "";
            document.getElementById('formLocation').value = "";
            document.getElementById('formStart').value = dateStr;
            document.getElementById('formEnd').value = dateStr;
        }
        overlay.classList.add('active');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

    function saveEvent() {
        const idx = parseInt(document.getElementById('editIndex').value);
        const eventData = {
            name: document.getElementById('formTitle').value.trim(),
            target: document.getElementById('formTarget').value.trim(),
            degree: document.getElementById('formDegree').value.trim(),
            loc: document.getElementById('formLocation').value.trim(),
            start: document.getElementById('formStart').value,
            end: document.getElementById('formEnd').value
        };
        if(!eventData.name) { alert("교육명을 입력하세요."); return; }
        if (idx >= 0) { academyEvents[idx] = eventData; } 
        else { academyEvents.push(eventData); }
        localStorage.setItem('safety_academy_events', JSON.stringify(academyEvents));
        renderSingleMonth();
        closeModal();
    }

    function deleteEvent() {
        const idx = parseInt(document.getElementById('editIndex').value);
        if (idx >= 0 && confirm("이 일정을 삭제하시겠습니까?")) {
            academyEvents.splice(idx, 1);
            localStorage.setItem('safety_academy_events', JSON.stringify(academyEvents));
            renderSingleMonth();
            closeModal();
        } else { closeModal(); }
    }

    // ★ 내가 수정한 스케줄을 코드 소스로 실시간 변환 추출하는 장치
    function openExportModal() {
        const docText = document.documentElement.outerHTML;
        const regex = /const rawEvents = \[\s*[\s\S]*?\s*\];/;
        const currentEventsStr = "const rawEvents = " + JSON.stringify(academyEvents) + ";";
        const updatedDocText = docText.replace(regex, currentEventsStr);
        
        document.getElementById('exportContent').value = updatedDocText;
        document.getElementById('exportModal').classList.add('active');
    }

    function closeExportModal() { document.getElementById('exportModal').classList.remove('active'); }

    function copyExportCode() {
        const content = document.getElementById('exportContent');
        content.select();
        document.execCommand('copy');
        alert('📋 데이터가 수정된 코드가 복사되었습니다!\n이 코드를 GitHub index.html에 그대로 덮어쓰기 하시면 협력사 직원들에게 실시간 전파됩니다.');
        closeExportModal();
    }

    window.onload = () => { initData(); renderSingleMonth(); };
</script>
</body>
</html>
